name: Build Action

# Rebuilds dist/index.js whenever action source changes and commits it back.
# GitHub Actions reads the pre-built dist directly — no install step runs at
# action runtime — so this file must always be up to date on main.

on:
  push:
    branches: [main]
    paths:
      - 'packages/action/src/**'
      - 'packages/action/scripts/**'
      - 'packages/action/package.json'
      - 'packages/shared/src/**' # shared is bundled into the action dist

jobs:
  build:
    name: Rebuild action dist
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build action
        run: pnpm build:action

      - name: Commit updated dist
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/action/dist/index.js
          git diff --staged --quiet && echo "No dist changes" && exit 0
          git commit -m "build(action): update dist [skip ci]"
          git push
