name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Knip
        run: pnpm knip

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (shared)
        run: pnpm test:shared

      - name: Test (CLI)
        run: pnpm test:cli

      - name: Test (notifier)
        run: pnpm test:notifier

      - name: Build (CLI)
        run: pnpm build:cli

      - name: Build (VS Code extension)
        run: pnpm build:vscode-extension

      - name: Build (docs)
        run: pnpm build:docs
        env:
          DOCS_BASE_PATH: /patch-pulse
