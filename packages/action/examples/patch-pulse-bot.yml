# Example: add this file to your repo at .github/workflows/patch-pulse-bot.yml
#
# This workflow runs PatchPulse weekly and opens one PR per outdated package (or
# package group). PRs include the version diff, release notes links, a
# breaking-change risk assessment, and a fully updated lockfile.
#
# Required repo permissions (Settings → Actions → General → Workflow permissions):
#   - Read and write permissions
#   - Allow GitHub Actions to create and approve pull requests

name: PatchPulse Dependency Bot

on:
  schedule:
    - cron: '0 8 * * 1' # Every Monday at 08:00 UTC
  workflow_dispatch: # Allow manual runs from the Actions tab

jobs:
  patch-pulse:
    name: Open dependency update PRs
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          # Fetch full history so git operations work correctly
          fetch-depth: 0

      - uses: pnpm/action-setup@v6 # Remove if your project uses npm or yarn

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm # Change to npm or yarn if needed

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: barrymichaeldoyle/patch-pulse/packages/action@action/v0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          # Which update types to open PRs for (default: all three)
          update-types: 'patch,minor,major'

          # Group related packages into a single PR so they update together.
          # Packages not listed here each get their own PR.
          groups: |
            {
              "tanstack": [
                "@tanstack/router",
                "@tanstack/start",
                "@tanstack/react-query"
              ]
            }

          # Never open PRs for these packages (supports * wildcards)
          ignore: '["some-internal-package", "@types/*"]'

          # Cap the number of open patch-pulse PRs (default: 10, 0 = unlimited)
          max-open-prs: '10'

          # Auto-merge PRs once CI passes for updates at or below this level
          # Options: patch | minor | none
          auto-merge: 'patch'

          # Who gets assigned and requested for review on new PRs
          assignees: '["your-github-username"]'
          reviewers: '["your-github-username"]'

          # Use a different commit/PR title prefix if your project doesn't use
          # conventional commits
          commit-message-prefix: 'chore(deps):'
